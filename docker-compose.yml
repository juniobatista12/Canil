services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-jadmin}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-jadmin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./JAdmin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-jadmin};
        Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-changeme}
      ConnectionStrings__Redis: redis:6379
      Jwt__Secret: ${JWT_SECRET:-super-secret-key-min-32-chars-for-hs256}
      Jwt__Issuer: JAdmin
      Jwt__Audience: JAdmin
      Jwt__ExpirationMinutes: 60
      Jwt__RefreshExpirationDays: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      TwoFactor__Issuer: ${TWO_FACTOR_ISSUER:-JAdmin}
      Cors__AllowedOrigins: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      Seed__Enabled: ${SEED_ENABLED:-true}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-admin@localhost}
      Seed__AdminPassword: ${SEED_ADMIN_PASSWORD:-Admin@123!}
      Seed__Roles: ${SEED_ROLES:-Admin,User}
      Seed__AdminRoles: ${SEED_ADMIN_ROLES:-Admin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./web-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
