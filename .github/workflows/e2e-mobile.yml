name: E2E Mobile

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  mobile-e2e:
    name: mobile-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MAESTRO_VERSION: 1.39.9
      MAESTRO_CLI_NO_ANALYTICS: 'true'
      ANDROID_SDK_ROOT: /home/runner/.android/sdk
      ANDROID_HOME: /home/runner/.android/sdk
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          echo "--- Disk before cleanup ---"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf "${AGENT_TOOLSDIRECTORY}/CodeQL"
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "${AGENT_TOOLSDIRECTORY}/Go"
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo docker image prune -af || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          mkdir -p "$ANDROID_SDK_ROOT"
          echo "--- Disk after cleanup ---"
          df -h
      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm
      - name: Start API stack
        run: docker compose --env-file .env.test up -d --build db redis api
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && exit 0
            sleep 5
          done
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile-client/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile-client/android/.gradle
          key: mobile-gradle-${{ runner.os }}-${{ hashFiles('mobile-client/package-lock.json') }}
          restore-keys: |
            mobile-gradle-${{ runner.os }}-
      - name: Cache Maestro CLI
        uses: actions/cache@v4
        id: maestro-cache
        with:
          path: ~/.maestro
          key: maestro-cli-${{ runner.os }}-${{ env.MAESTRO_VERSION }}
      - name: Install Maestro
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: curl -Ls "https://get.maestro.mobile.dev" | bash -s -- "${{ env.MAESTRO_VERSION }}"
      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Build debug APK
        working-directory: mobile-client
        env:
          EXPO_PUBLIC_API_URL: http://10.0.2.2:8080
        run: |
          echo "EXPO_PUBLIC_API_URL=http://10.0.2.2:8080" > .env
          npm ci
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleDebug --no-daemon -x lint
      - name: Trim Android build artifacts
        run: |
          rm -rf mobile-client/android/app/build/intermediates
          rm -rf mobile-client/android/app/build/tmp
          rm -rf mobile-client/android/app/build/generated
          rm -rf mobile-client/android/build
          echo "--- Disk after APK trim ---"
          df -h
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_3a
          disable-animations: true
          emulator-boot-timeout: 1200
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics
          script: |
            export PATH="$HOME/.maestro/bin:$PATH"
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed | tr -d "\r") ]]; do sleep 2; done'
            adb reverse tcp:8080 tcp:8080 || true
            adb install -r mobile-client/android/app/build/outputs/apk/debug/app-debug.apk
            curl -sf http://127.0.0.1:8080/health
            export SEED_TENANT_SLUG=system
            export SEED_SUPERADMIN_EMAIL='superadmin@localhost'
            export SEED_SUPERADMIN_PASSWORD='SuperAdmin@123!'
            maestro test mobile-client/.maestro/login.yaml mobile-client/.maestro/drawer-navigation.yaml mobile-client/.maestro/logout.yaml
      - name: Tear down
        if: always()
        run: docker compose --env-file .env.test down -v
