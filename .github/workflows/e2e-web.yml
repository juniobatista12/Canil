name: E2E Web

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  web-e2e:
    name: web-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose --env-file .env.test up -d --build db redis api web
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/health && exit 0
            sleep 5
          done
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Install Playwright
        working-directory: web-client
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright
        working-directory: web-client
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
          E2E_SUPERADMIN_EMAIL: superadmin@localhost
          E2E_SUPERADMIN_PASSWORD: SuperAdmin@123!
          SEED_TENANT_SLUG: system
          E2E_2FA_SECRET: JBSWY3DPEHPK3PXP
          CI: true
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-client/playwright-report
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose --env-file .env.test down -v
