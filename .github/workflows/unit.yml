name: Unit

on:
  pull_request:

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore and test
        working-directory: JAdmin
        run: dotnet test JAdmin.slnx --configuration Release --collect:"XPlat Code Coverage"
      - name: Docker build API
        run: docker build -f JAdmin/Dockerfile -t jadmin-api:ci JAdmin

  web-test:
    name: web-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --max-old-space-size=6144
      - run: npm run build
      - name: Docker build web
        working-directory: .
        run: docker build -f web-client/Dockerfile --build-arg VITE_API_URL= -t jadmin-web:ci web-client

  mobile-test:
    name: mobile-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile-client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build:check
